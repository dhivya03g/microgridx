<!DOCTYPE html>
<html>

<head>

<title>MicroGridX Smart Microgrid Monitoring System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
font-family:Arial;
margin:0;
}

h1{
text-align:center;
margin-top:25px;
color:#00ffff;
text-shadow:0 0 20px cyan;
}

.main-layout{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
flex-wrap:wrap;
padding:20px;
}

.hardware-panel{
width:540px;
padding:20px;
border-radius:14px;
border:2px solid cyan;
background:#020617;
box-shadow:0 0 40px cyan;
text-align:center;
}

.cube-wrapper{
perspective:1200px;
display:flex;
justify-content:center;
margin-top:30px;
}

.twin-cube{
width:360px;
height:360px;
position:relative;
transform-style:preserve-3d;
animation:rotateCube 16s linear infinite;
}

.cube-face{
position:absolute;
width:360px;
height:360px;
border:2px solid cyan;
background:rgba(0,255,255,0.06);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 0 40px cyan,inset 0 0 50px rgba(0,255,255,0.4);
}

.cube-face img{
width:130px;
margin-bottom:10px;
filter:drop-shadow(0 0 15px cyan);
}

.sensor{
animation:sensorBlink 1.5s infinite;
}

@keyframes sensorBlink{
0%{filter:drop-shadow(0 0 5px cyan);}
50%{filter:drop-shadow(0 0 30px lime);}
100%{filter:drop-shadow(0 0 5px cyan);}
}

.front{ transform:translateZ(180px); }
.back{ transform:rotateY(180deg) translateZ(180px); }
.right{ transform:rotateY(90deg) translateZ(180px); }
.left{ transform:rotateY(-90deg) translateZ(180px); }
.top{ transform:rotateX(90deg) translateZ(180px); }
.bottom{ transform:rotateX(-90deg) translateZ(180px); }

@keyframes rotateCube{
0%{ transform:rotateX(-18deg) rotateY(0deg); }
100%{ transform:rotateX(-18deg) rotateY(360deg); }
}

.digital-panel{
width:720px;
padding:20px;
border-radius:14px;
border:2px solid cyan;
background:#020617;
box-shadow:0 0 40px cyan;
}

.container{
display:flex;
flex-wrap:wrap;
gap:30px;
justify-content:center;
margin-top:25px;
}

.card{
width:200px;
padding:20px;
border-radius:12px;
border:2px solid cyan;
background:rgba(0,255,255,0.07);
box-shadow:0 0 25px cyan;
}

.battery-bar{
width:100%;
height:12px;
background:#333;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

#battery-level{
height:100%;
background:lime;
}

.status{
text-align:center;
font-size:22px;
margin-top:20px;
color:#22c55e;
}

.alerts{
margin-top:30px;
padding:15px;
border-radius:10px;
border:1px solid cyan;
background:rgba(0,255,255,0.05);
}

.alert{
margin-top:6px;
}

canvas{
margin-top:30px;
}

/* 🔥 POPUP STYLE */
.popup{
position:fixed;
top:20px;
right:20px;
padding:15px 20px;
border-radius:10px;
color:white;
font-size:14px;
z-index:9999;
box-shadow:0 0 20px black;
}

</style>

</head>

<body>

<h1>⚡ MicroGridX Smart Microgrid Monitoring System</h1>

<div class="main-layout">

<div class="hardware-panel">
<h2>Digital Twin Hardware</h2>

<div class="cube-wrapper">
<div class="twin-cube">

<div class="cube-face front">
<img src="images/solar.png">
<p>Solar Panel</p>
</div>

<div class="cube-face right">
<img src="images/battery.png">
<p>Battery</p>
</div>

<div class="cube-face left">
<img class="sensor" src="images/esp32.png">
<p>ESP32</p>
</div>

<div class="cube-face back">
<img class="sensor" src="images/dht22.png">
<p>DHT22 Sensor</p>
</div>

<div class="cube-face top"><p>MicroGridX</p></div>
<div class="cube-face bottom"><p>Energy System</p></div>

</div>
</div>
</div>

<div class="digital-panel">

<h2>Digital Twin Dashboard</h2>

<div class="container">

<div class="card">
<h3>☀ Solar</h3>
<p id="solar">--</p>
</div>

<div class="card">
<h3>🔋 Battery</h3>
<p id="battery">--</p>
<div class="battery-bar"><div id="battery-level"></div></div>
</div>

<div class="card">
<h3>🌡 Temperature</h3>
<p id="temp">--</p>
</div>

<div class="card">
<h3>🔮 Predicted Demand</h3>
<p id="prediction">--</p>
</div>

</div>

<div class="status" id="systemStatus">
System Status: Waiting...
</div>

<div class="alerts" id="alertsBox">
<b>⚠ Smart Alerts</b>
<div class="alert" id="alert1"></div>
<div class="alert" id="alert2"></div>
<div class="alert" id="alert3"></div>
</div>

<!-- 📡 GSM DISPLAY -->
<div id="gsmBox" style="margin-top:15px;padding:10px;border:1px solid cyan;border-radius:8px;">
📡 GSM Status: Ready
</div>

<canvas id="energyChart"></canvas>

</div>

</div>

<script>


function showPopup(message,color){
let p=document.createElement("div")
p.className="popup"
p.style.background=color
p.innerText=message
document.body.appendChild(p)
setTimeout(()=>p.remove(),3000)
}


function sendSMS(msg){
document.getElementById("gsmBox").innerText="📡 SMS Sent: "+msg
console.log("SMS:",msg)
}

// FETCH DATA
async function fetchData(){
try{
const res=await fetch("http://127.0.0.1:5000/api/data")
const data=await res.json()

let solar=data.energy_status.solar_power
let battery=data.energy_status.battery_level
let temp=data.energy_status.temperature
let demand=data.energy_status.predicted_demand

document.getElementById("solar").innerText=solar+" W"
document.getElementById("battery").innerText=battery+"%"
document.getElementById("temp").innerText=temp+" °C"
document.getElementById("prediction").innerText=demand+" W"

document.getElementById("battery-level").style.width=battery+"%"
document.getElementById("systemStatus").innerText="Mode: "+data.decision.energy_mode

// ALERTS

// Low Battery
if(battery<25){
showPopup("⚠ Low Battery - Load Shifted","red")
sendSMS("Low Battery Alert")
alert1.innerText="⚠ Low Battery"
}

// High Demand
if(demand>solar){
showPopup("⚡ High Demand - Using Backup","orange")
sendSMS("High Demand Alert")
alert2.innerText="⚡ Demand > Supply"
}

// High Temp
if(temp>40){
showPopup("🔥 Overheat Warning","red")
sendSMS("High Temperature Alert")
alert3.innerText="🔥 High Temperature"
}

// Critical Fault
if(battery<15 && demand>solar){
showPopup("❌ CRITICAL FAULT - Emergency Mode","darkred")
sendSMS("Critical Fault Alert")
}

}catch{
document.getElementById("systemStatus").innerText="Backend not connected"
}
}

setInterval(fetchData,2000)

// GRAPH
new Chart(document.getElementById("energyChart"),{
type:"line",
data:{
labels:["1","2","3","4","5"],
datasets:[
{label:"Solar",data:[200,240,260,280,300]},
{label:"Battery",data:[70,72,75,78,80]}
]
}
})

</script>

</body>
</html>
