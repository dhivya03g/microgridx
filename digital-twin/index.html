<!DOCTYPE html>
<html>

<head>
<title>MicroGridX Smart Microgrid Monitoring System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= GLOBAL ================= */

body{
background:#020617;
color:#e2e8f0;
font-family:'Segoe UI',sans-serif;
margin:0;
overflow-x:hidden;
}

/* ================= NAVBAR ================= */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#020617;
border-bottom:1px solid #1e293b;
position:sticky;
top:0;
z-index:100;
}

.navbar h2{
color:#38bdf8;
}

.navbar button{
margin-left:10px;
padding:8px 15px;
background:#0f172a;
border:1px solid #334155;
color:white;
cursor:pointer;
border-radius:6px;
transition:0.3s;
}

.navbar button:hover{
background:#38bdf8;
color:#020617;
}

/* ================= TITLE ================= */

h1{
text-align:center;
margin:20px 0;
color:#38bdf8;
}

/* ================= CLOCK ================= */

#clock{
text-align:center;
color:#94a3b8;
margin-bottom:10px;
}

/* ================= LAYOUT ================= */

.main-layout{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:20px;
}

/* ================= PANELS ================= */

.hardware-panel,
.digital-panel{
background:#0f172a;
border:1px solid #1e293b;
border-radius:12px;
padding:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

.hardware-panel{ width:500px; }
.digital-panel{ width:720px; }

/* ================= SECTION ================= */

.section-title{
color:#38bdf8;
margin-top:15px;
}

/* ================= DIGITAL TWIN ================= */

.cube-wrapper{
perspective:1200px;
display:flex;
justify-content:center;
margin-top:20px;
}

.twin-cube{
width:320px;
height:320px;
position:relative;
transform-style:preserve-3d;
animation:rotateCube 20s linear infinite;
}

.cube-face{
position:absolute;
width:320px;
height:320px;

/* glass */
background:rgba(255,255,255,0.01);

/* edges */
border:1px solid rgba(0,255,255,0.6);

/* glow */
box-shadow:
0 0 25px rgba(0,255,255,0.6),
inset 0 0 10px rgba(0,255,255,0.2);

backdrop-filter: blur(6px);

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* flow line */
.cube-face::after{
content:"";
width:60%;
height:2px;
background:cyan;
opacity:0.6;
margin-top:10px;
animation:flow 1s infinite alternate;
}

@keyframes flow{
from{opacity:0.3;}
to{opacity:1;}
}

/* floating */
.cube-face img{
width:90px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.front{ transform:translateZ(160px); }
.back{ transform:rotateY(180deg) translateZ(160px); }
.right{ transform:rotateY(90deg) translateZ(160px); }
.left{ transform:rotateY(-90deg) translateZ(160px); }
.top{ transform:rotateX(90deg) translateZ(160px); }
.bottom{ transform:rotateX(-90deg) translateZ(160px); }

@keyframes rotateCube{
0%{transform:rotateX(-15deg) rotateY(0);}
100%{transform:rotateX(-15deg) rotateY(360deg);}
}

/* ================= CARDS ================= */

.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:#020617;
border:1px solid #334155;
border-radius:10px;
padding:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 15px rgba(56,189,248,0.4);
}

/* ================= BATTERY ================= */

.battery-bar{
width:100%;
height:8px;
background:#1e293b;
border-radius:6px;
margin-top:8px;
}

#battery-level{
height:100%;
background:#22c55e;
border-radius:6px;
}

/* ================= STATUS ================= */

.status{
text-align:center;
font-size:18px;
margin-top:20px;
}

/* ================= AI ================= */

#aiSummary{
margin-top:15px;
padding:12px;
border:1px solid #334155;
border-radius:8px;
background:#020617;
color:#38bdf8;
}

/* ================= HEALTH ================= */

#healthBox{
margin-top:10px;
padding:10px;
border-radius:8px;
background:#020617;
border:1px solid #334155;
}

/* ================= ALERTS ================= */

.alerts{
margin-top:20px;
padding:15px;
background:#020617;
border:1px solid #334155;
border-radius:10px;
}

.alert{
margin-top:6px;
}

/* ================= GSM ================= */

#gsmBox{
margin-top:15px;
padding:10px;
background:#020617;
border:1px solid #334155;
border-radius:8px;
}

/* ================= POPUP ================= */

.popup{
position:fixed;
top:20px;
right:20px;
padding:12px 18px;
border-radius:8px;
color:white;
z-index:999;
}

/* ================= GRAPH ================= */

canvas{
margin-top:25px;
background:#020617;
border-radius:8px;
padding:10px;
}

</style>

</head>

<body>

<div class="navbar">
<h2>⚡ MicroGridX</h2>
<div>
<button onclick="scrollToSection('overview')">Overview</button>
<button onclick="scrollToSection('alerts')">Alerts</button>
<button onclick="scrollToSection('analytics')">Analytics</button>
</div>
</div>

<h1>Smart Microgrid Monitoring System</h1>

<div id="clock"></div>

<div class="main-layout">

<div class="hardware-panel">
<h2 class="section-title">Digital Twin Hardware</h2>

<div class="cube-wrapper">
<div class="twin-cube">

<div class="cube-face front"><img src="images/solar.png"><p>Solar</p></div>
<div class="cube-face right"><img src="images/battery.png"><p>Battery</p></div>
<div class="cube-face left"><img src="images/esp32.png"><p>ESP32</p></div>
<div class="cube-face back"><img src="images/dht22.png"><p>DHT22</p></div>
<div class="cube-face top"><p>MicroGridX</p></div>
<div class="cube-face bottom"><p>Energy</p></div>

</div>
</div>
</div>

<div class="digital-panel">

<h2 id="overview" class="section-title">System Overview</h2>

<div class="container">
<div class="card"><h4>☀ Solar</h4><p id="solar">--</p></div>
<div class="card"><h4>🔋 Battery</h4><p id="battery">--</p><div class="battery-bar"><div id="battery-level"></div></div></div>
<div class="card"><h4>🌡 Temperature</h4><p id="temp">--</p></div>
<div class="card"><h4>🔮 Demand</h4><p id="prediction">--</p></div>
</div>

<div class="status" id="systemStatus">Waiting...</div>

<div id="aiSummary">🧠 AI Analysis: Waiting...</div>

<div id="healthBox">System Health: <span id="healthStatus">--</span></div>

<h2 id="alerts" class="section-title">Smart Alerts</h2>

<div class="alerts">
<div class="alert" id="alert1"></div>
<div class="alert" id="alert2"></div>
<div class="alert" id="alert3"></div>
</div>

<div id="gsmBox">📡 GSM Ready</div>

<h2 id="analytics" class="section-title">Energy Analytics</h2>

<canvas id="energyChart"></canvas>

</div>

</div>

<script>

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'})
}

function showPopup(msg,color){
let p=document.createElement("div")
p.className="popup"
p.style.background=color
p.innerText=msg
document.body.appendChild(p)
setTimeout(()=>p.remove(),3000)
}

function sendSMS(msg){
gsmBox.innerText="📡 SMS: "+msg
}

setInterval(()=>{
clock.innerText="⏱ "+new Date().toLocaleTimeString()
},1000)

async function fetchData(){
try{
const res=await fetch("http://127.0.0.1:5000/api/data")
const data=await res.json()

solar.innerText=data.energy_status.solar_power+" W"
battery.innerText=data.energy_status.battery_level+"%"
temp.innerText=data.energy_status.temperature+" °C"
prediction.innerText=data.energy_status.predicted_demand+" W"

batteryLevel.style.width=data.energy_status.battery_level+"%"

let mode=data.decision.energy_mode
systemStatus.innerText="Mode: "+mode

aiSummary.innerText="🧠 AI: "+data.decision.system_action

let health=data.system_health
healthStatus.innerText=health

if(health==="GREEN") healthStatus.style.color="#22c55e"
else if(health==="YELLOW") healthStatus.style.color="#facc15"
else healthStatus.style.color="#ef4444"

if(data.energy_status.battery_level<25){
showPopup("⚠ Low Battery","red")
sendSMS("Low Battery")
alert1.innerText="⚠ Battery Low"
}

if(data.energy_status.predicted_demand>data.energy_status.solar_power){
showPopup("⚡ High Demand","orange")
sendSMS("Demand High")
alert2.innerText="⚡ Demand High"
}

if(data.energy_status.temperature>40){
showPopup("🔥 High Temp","red")
sendSMS("Temp High")
alert3.innerText="🔥 Temperature High"
}

}catch{
systemStatus.innerText="Backend not connected"
}
}

setInterval(fetchData,2000)

new Chart(document.getElementById("energyChart"),{
type:"line",
data:{
labels:["1","2","3","4","5"],
datasets:[
{label:"Solar",data:[200,240,260,280,300]},
{label:"Battery",data:[70,72,75,78,80]}
]
}
})

</script>

</body>
</html>
