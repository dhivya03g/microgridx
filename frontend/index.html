<!DOCTYPE html>

<html>
<head>

<title>MicroGridX Smart Energy Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
}

header{
background:#2c3e50;
color:white;
padding:20px;
font-size:28px;
}

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin:20px;
}

.card{
background:white;
padding:20px;
width:200px;
border-radius:10px;
box-shadow:0px 2px 8px rgba(0,0,0,0.1);
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
}

th{
background:#27ae60;
color:white;
}

button{
padding:10px 16px;
margin:10px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.house{
width:80px;
height:80px;
background:#3498db;
color:white;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
margin:10px;
}

#grid{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

</style>

</head>

<body onload="startAutoRefresh()">

<header>⚡ MicroGridX Smart Energy Dashboard</header>

<div class="cards">

<div class="card">
<h3>Total Houses</h3>
<h2 id="houseCount">0</h2>
</div>

<div class="card">
<h3>Total Solar</h3>
<h2 id="solarTotal">0 W</h2>
</div>

<div class="card">
<h3>Total Usage</h3>
<h2 id="usageTotal">0 W</h2>
</div>

<div class="card">
<h3>Tomorrow Solar</h3>
<h2 id="prediction">0 W</h2>
</div>

<div class="card">
<h3>Battery Level</h3>
<h2 id="batteryLevel">0 W</h2>
</div>

</div>

<table id="houseTable">
<tr>
<th>House</th>
<th>Solar</th>
<th>Usage</th>
</tr>
</table>

<button onclick="loadHouses()">Refresh Data</button> <button onclick="matchEnergy()">Run Energy Matching</button> <button onclick="addHouse()">Add House</button>

<h3 id="result"></h3>

<div style="width:70%;margin:auto">
<canvas id="energyChart"></canvas>
</div>

<h2>Community Microgrid</h2>

<div id="grid"></div>

<script>

let chart;

function startAutoRefresh(){
loadHouses()
loadPrediction()
loadBattery()

setInterval(loadHouses,5000)
}

function loadHouses(){

fetch("http://127.0.0.1:5000/houses")
.then(res=>res.json())
.then(data=>{

let table=document.getElementById("houseTable")

table.innerHTML=`<tr>
<th>House</th>
<th>Solar</th>
<th>Usage</th>
</tr>`

let grid=document.getElementById("grid")
grid.innerHTML=""

let solarTotal=0
let usageTotal=0

data.forEach(h=>{

let row=table.insertRow()

row.insertCell(0).innerHTML=h.house_id
row.insertCell(1).innerHTML=h.solar
row.insertCell(2).innerHTML=h.usage

solarTotal+=h.solar
usageTotal+=h.usage

let house=document.createElement("div")
house.className="house"
house.innerHTML=h.house_id

grid.appendChild(house)

})

document.getElementById("houseCount").innerHTML=data.length
document.getElementById("solarTotal").innerHTML=solarTotal+" W"
document.getElementById("usageTotal").innerHTML=usageTotal+" W"

createChart(data)

})

}

function addHouse(){

fetch("http://127.0.0.1:5000/add-house",{method:"POST"})
.then(res=>res.json())
.then(data=>{
alert("House Added: "+data.house_id)
loadHouses()
})

}

function loadPrediction(){

fetch("http://127.0.0.1:5000/predict-solar")
.then(res=>res.json())
.then(data=>{
document.getElementById("prediction").innerHTML=data.predicted_solar+" W"
})

}

function loadBattery(){

fetch("http://127.0.0.1:5000/battery-status")
.then(res=>res.json())
.then(data=>{
document.getElementById("batteryLevel").innerHTML=data.level+" W"
})

}

function createChart(data){

let houses=[]
let solar=[]
let usage=[]

data.forEach(h=>{
houses.push(h.house_id)
solar.push(h.solar)
usage.push(h.usage)
})

let ctx=document.getElementById("energyChart")

if(chart){
chart.destroy()
}

chart=new Chart(ctx,{
type:"bar",
data:{
labels:houses,
datasets:[
{
label:"Solar",
data:solar,
backgroundColor:"#27ae60"
},
{
label:"Usage",
data:usage,
backgroundColor:"#e67e22"
}
]
}
})

}

function matchEnergy(){

fetch("http://127.0.0.1:5000/energy-match")
.then(res=>res.json())
.then(data=>{

let t=data[0]

document.getElementById("result").innerHTML =
"⚡ "+t.energy+"W transferred from "+t.from+" → "+t.to

})

}

</script>

</body>
</html>
